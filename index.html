<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รดน้ำดำหัวออนไลน์</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: #fff8e7;
}

.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* รูป */
img, video {
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
}

/* ปุ่ม */
button {
    padding: 12px 20px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    background: #bf953f;
    color: white;
    font-size: 16px;
}

/* กล่องคำอวยพร */
.bless-box {
    position: fixed;
    bottom: 20%;
    width: 80%;
    left: 10%;
    background: rgba(255,255,255,0.95);
    padding: 18px;
    border-radius: 15px;
    border: 2px solid #bf953f;
    display: none;

    max-height: 120px;
    overflow-y: auto;
    line-height: 1.6;
}
</style>
</head>

<body>

<!-- หน้า 1 -->
<div id="page1" class="page active">
    <h2>💦 ยินดีต้อนรับ</h2>
    <button onclick="nextPage(2)">เริ่ม</button>
</div>

<!-- หน้า 2 -->
<div id="page2" class="page">
    <h2>เลือกทำพิธี</h2>
    <button onclick="startCeremony()">เริ่มรดน้ำ</button>
</div>

<!-- หน้า 3 -->
<div id="page3" class="page">
    <h3 id="bossName"></h3>

    <img id="bossImg">
    <video id="bossVdo" style="display:none;"></video>

    <br>
    <button onclick="playVdo()">💧 รดน้ำ</button>

    <div class="bless-box" id="blessBox"></div>

    <button id="nextBtn" style="display:none;" onclick="nextBoss()">ถัดไป</button>
</div>

<script>

/* ------------------ ข้อมูล ------------------ */
const bosses = [
{
    name: "ผู้ใหญ่ 1",
    img: "https://via.placeholder.com/250",
    vdo: "https://www.w3schools.com/html/mov_bbb.mp4"
},
{
    name: "ผู้ใหญ่ 2",
    img: "https://via.placeholder.com/250/ffaaaa",
    vdo: "https://www.w3schools.com/html/movie.mp4"
}
];

const wishes = [
"ขอให้มีความสุขสดชื่น เบิกบานใจ สุขภาพแข็งแรงตลอดปีใหม่ไทย",
"ขออำนาจคุณพระศรีรัตนตรัยดลบันดาลให้ประสบแต่ความสุขและความเจริญ",
"ขอให้ปีใหม่นี้เป็นปีที่เต็มไปด้วยความสำเร็จรุ่งเรืองและโชคลาภ",
"ขอให้มีพลังกายพลังใจที่เข้มแข็ง พร้อมนำพาองค์กรสู่ความก้าวหน้า",
"ขอให้สิ่งศักดิ์สิทธิ์คุ้มครองให้แคล้วคลาดปลอดภัยจากอุปสรรคทั้งปวง",
"ขอให้ทุกวันของปีใหม่ไทยเต็มไปด้วยรอยยิ้มและความราบรื่นในการทำงาน",
"ขอให้มีความสุขสำราญใจ ร่างกายสมบูรณ์แข็งแรง ปราศจากโรคภัยไข้เจ็บ",
"ขอให้เป็นที่รักและเคารพของผู้ร่วมงานและผู้ใต้บังคับบัญชาสืบไป",
"ขอให้มีโชคมีชัย ร่ำรวยเงินทองและบารมีตลอดปีและตลอดไป",
"ขอให้สายน้ำสงกรานต์ชะล้างความทุกข์โศก และนำพาความสดใสมาสู่ชีวิต",
"ขอให้หน้าที่การงานเจริญก้าวหน้า ประสบความสำเร็จในทุกสิ่งที่ตั้งใจ",
"ขอให้ครอบครัวมีความสุขอบอุ่น และเต็มไปด้วยความรักความเข้าใจ"
];

/* ------------------ ตัวแปร ------------------ */
let current = 0;
let lastWish = -1;
let isPlaying = false;

/* ------------------ ฟังก์ชัน ------------------ */

// เปลี่ยนหน้า
function nextPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page'+n).classList.add('active');
}

// เริ่มพิธี
function startCeremony(){
    current = 0;
    loadBoss();
    nextPage(3);
}

// โหลดคน
function loadBoss(){
    const b = bosses[current];

    document.getElementById('bossName').innerText = b.name;

    const img = document.getElementById('bossImg');
    const v = document.getElementById('bossVdo');

    img.src = b.img;
    img.style.display = "block";

    v.src = b.vdo;
    v.style.display = "none";

    document.getElementById('blessBox').style.display = "none";
    document.getElementById('nextBtn').style.display = "none";
}

// กดรดน้ำ
function playVdo(){
    if(isPlaying) return;
    isPlaying = true;

    const img = document.getElementById('bossImg');
    const v = document.getElementById('bossVdo');

    img.style.display = "none";
    v.style.display = "block";
    v.play();

    v.onended = ()=>{
        isPlaying = false;

        let i;
        do {
            i = Math.floor(Math.random() * wishes.length);
        } while(i === lastWish);

        lastWish = i;

        const box = document.getElementById('blessBox');
        box.innerText = wishes[i];
        box.style.display = "block";

        document.getElementById('nextBtn').style.display = "inline-block";
    }
}

// คนถัดไป
function nextBoss(){
    current++;

    if(current < bosses.length){
        loadBoss();
    } else {
        alert("จบแล้ว 💖");
        location.reload();
    }
}

</script>

</body>
</html>
