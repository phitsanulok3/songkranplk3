<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รดน้ำขอพร สพป.พิษณุโลก เขต 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(0deg, #8a5a12, #fcf6ba); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Sarabun', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: #fff; position: relative; }
        .page { display: none; width: 100%; height: 100%; position: absolute; }
        .page.active { display: block; }
        .bg-img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .btn-wrapper { position: absolute; bottom: 10%; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .btn-main { 
            background: var(--gold); padding: 15px 30px; width: 80%; border-radius: 50px; 
            border: 2px solid #aa771c; font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .vdo-container { width: 100%; height: 100%; background: #000; display: flex; align-items: center; z-index: 50; }
        video { width: 100%; height: auto; }
        .bless-box { 
            position: absolute; bottom: 25%; width: 80%; left: 10%; background: rgba(255,255,255,0.9);
            padding: 15px; border-radius: 15px; border: 2px solid #bf953f; text-align: center; display: none; z-index: 110;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop crossorigin="anonymous">
    <source src="https://res.cloudinary.com/dl5s23mrx/video/upload/v1775636309/YouTube_Media_tF_bSujYr-E_009_128k_apykmk.mp3" type="audio/mpeg">
</audio>

<div class="app-container">
    <div id="page1" class="page active">
        <img src="https://res.cloudinary.com/dl5s23mrx/image/upload/v1775638983/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_6_put9vc.png" class="bg-img">
        <div class="btn-wrapper"><button class="btn-main" onclick="nextPage(2)">✓ กดเข้าร่วมพิธี</button></div>
    </div>

    <div id="page2" class="page">
        <img src="https://res.cloudinary.com/dl5s23mrx/image/upload/v1775638921/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_7_bk0vjv.png" class="bg-img">
        <div class="btn-wrapper"><button class="btn-main" onclick="startCeremony()">เริ่มรดน้ำท่านแรก ></button></div>
    </div>

    <div id="page3" class="page">
        <div id="stillPhase" style="height:100%">
            <img id="bossPic" src="" class="bg-img">
            <div class="btn-wrapper"><button class="btn-main" onclick="playVdo()">💧 กดรดน้ำขอพร</button></div>
        </div>
        <div id="vdoPhase" class="vdo-container" style="display:none">
            <video id="vdoPlayer" playsinline muted><source id="vdoSrc" src="" type="video/mp4"></video>
            <div id="blessText" class="bless-box"></div>
            <div class="btn-wrapper" id="nextAction" style="display:none">
                <button id="btnNext" class="btn-main" onclick="nextBoss()">ไปท่านถัดไป ></button>
            </div>
        </div>
    </div>
</div>

<script>
    const data = [
        { img: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775639012/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_10_n7jun1.png', vdo: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775629825/Man_receiving_water_202604081322_cu8y3d.mp4' },
        { img: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775638965/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_8_ooi3o9.png', vdo: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775629823/Man_receiving_water_202604081328_ojpwzo.mp4' },
        { img: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775639095/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_11_t9zgzw.png', vdo: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775632464/Woman_receiving_water_202604081413_dfhz7x.mp4' },
        { img: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775638921/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_5_p28fgy.png', vdo: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775631683/Man_receives_water__202604081358_vptyar.mp4' },
        { img: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775638964/%E0%B8%A3%E0%B8%94%E0%B8%99%E0%B9%89%E0%B8%B3_%E0%B8%9C%E0%B8%AD_9_nzzh4v.png', vdo: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775636857/Woman_receiving_water_202604081527_kabv6t.mp4' }
    ];

    const wishes = ["ขอให้มีความสุขสดชื่นตลอดปีใหม่ไทย", "ขอให้สุขภาพแข็งแรง ประสบความสำเร็จ", "ขอให้มีรอยยิ้มและความราบรื่นในการทำงาน"];
    let current = 0;

    function nextPage(n) {
        if(n === 2) document.getElementById('bgMusic').play().catch(() => {});
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + n).classList.add('active');
    }

    function startCeremony() {
        current = 0;
        loadBoss();
        nextPage(3);
    }

    function loadBoss() {
        document.getElementById('bossPic').src = data[current].img;
        document.getElementById('vdoSrc').src = data[current].vdo;
        document.getElementById('vdoPlayer').load();
        document.getElementById('stillPhase').style.display = 'block';
        document.getElementById('vdoPhase').style.display = 'none';
        document.getElementById('nextAction').style.display = 'none';
        document.getElementById('blessText').style.display = 'none';
    }

    function playVdo() {
        document.getElementById('stillPhase').style.display = 'none';
        document.getElementById('vdoPhase').style.display = 'flex';
        const v = document.getElementById('vdoPlayer');
        v.play();
        v.onended = () => {
            const txt = document.getElementById('blessText');
            txt.innerText = wishes[Math.floor(Math.random() * wishes.length)];
            txt.style.display = 'block';
            document.getElementById('nextAction').style.display = 'flex';
            document.getElementById('btnNext').innerText = (current === 4) ? "จบพิธี (เริ่มใหม่)" : "ไปท่านถัดไป >";
        };
    }

    function nextBoss() {
        if(current < 4) { current++; loadBoss(); } 
        else { location.reload(); }
    }
</script>
</body>
</html>
