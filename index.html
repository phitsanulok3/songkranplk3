<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รดน้ำขอพรผู้บริหาร สพป.พิษณุโลก เขต 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-grad: linear-gradient(0deg, #8a5a12 0%, #b38728 50%, #fcf6ba 100%);
            --blue-deep: #001ba0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Sarabun', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        .app-container {
            width: 100%; max-width: 500px; height: 100vh; margin: 0 auto;
            background: #fff; position: relative; overflow: hidden;
        }

        .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .bg-img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            image-rendering: -webkit-optimize-contrast;
            position: absolute; top: 0; left: 0; z-index: -1; 
        }

        .btn-wrapper {
            position: absolute; bottom: 8%; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        
        .btn-main {
            background: var(--gold-grad);
            color: #403010; border: 2px solid #aa771c;
            padding: 16px 0; width: 85%; border-radius: 50px;
            font-size: 20px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .blessing-overlay {
            width: 85%; background: rgba(255, 255, 255, 0.98);
            padding: 20px; border-radius: 15px; border: 3px solid #bf953f;
            text-align: center; font-size: 1.1rem; color: #222;
            margin-bottom: 20px; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            line-height: 1.5;
        }

        .vdo-container { width: 100%; height: 100%; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: auto; }

        .step-counter {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 6px 15px; border-radius: 20px; font-size: 14px; z-index: 110;
        }
    </style>
</head>
<body>
