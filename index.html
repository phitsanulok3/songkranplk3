<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รดน้ำขอพร สพป.พิษณุโลก เขต 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(0deg, #8a5a12, #fcf6ba); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Sarabun', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 500px; height: 100%; margin: auto; background: #fff; position: relative; overflow: hidden; }
        .page { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; }
        .page.active { display: block; }
        
        .bg-img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; pointer-events: none; }
        
        /* ปุ่มทั่วไป */
        .btn-wrapper { position: absolute; bottom: 10%; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        
        /* ✅ ปรับเฉพาะปุ่มในหน้าที่ 2 ให้ลงมาต่ำกว่าปกติ (เปลี่ยนจาก 10% เป็น 5%) */
        #page2 .btn-wrapper { bottom: 5%; }

        .btn-main { 
            background: var(--gold); padding: 18px; width: 85%; border-radius: 50px; 
            border: 2px solid #aa771c; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); touch-action: manipulation; color: #403010;
        }

        .vdo-container { width: 100%; height: 100%; background: #000; display: flex; align-items: center; z-index: 50; }
        video { width: 100%; height: auto; }

        .bless-box { 
            position: absolute; bottom: 25%; width: 85%; left: 7.5%; background: rgba(255,255,255,0.95);
            padding: 20px; border-radius: 15px; border: 3px solid #bf953f; text-align: center; display: none; z-index: 1100;
            line-height: 1.6; font-size: 1.15rem; color: #333; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
    <source src="https://res.cloudinary.com/dl5s23mrx/video/upload/v1775636309/YouTube_Media_tF_bSujYr-E_009_128k_apykmk.mp3" type="audio/mpeg">
</audio>

<div class="app-container">
    <div id="page1" class="page active">
        <img src="https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641748/mian_1_ysd0hx.png" class="bg-img">
        <div class="btn-wrapper"><button class="btn-main" onclick="changePage(2)">✓ กดเข้าร่วมพิธี</button></div>
    </div>

    <div id="page2" class="page">
        <img src="https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641747/main_2_mwppau.png" class="bg-img">
        <div class="btn-wrapper"><button class="btn-main" onclick="startFlow()" style="background:#001ba0; color:#fff; border-color:#fff;">เริ่มรดน้ำท่านแรก ></button></div>
    </div>

    <div id="page3" class="page">
        <div id="stillPhase" style="height:100%">
            <img id="bossPic" src="" class="bg-img">
            <div class="btn-wrapper"><button class="btn-main" onclick="playVdo()">💧 กดรดน้ำขอพร</button></div>
        </div>
        <div id="vdoPhase" class="vdo-container" style="display:none">
            <video id="vdoPlayer" playsinline muted><source id="vdoSrc" src="" type="video/mp4"></video>
            <div id="blessText" class="bless-box"></div>
            <div class="btn-wrapper" id="nextAction" style="display:none">
                <button id="btnNext" class="btn-main" onclick="nextStep()">ไปท่านถัดไป ></button>
            </div>
        </div>
    </div>
</div>

<script>
    const dataList = [
        { i: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641746/person_1_o3kfpl.png', v: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775629825/Man_receiving_water_202604081322_cu8y3d.mp4' },
        { i: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641747/person_2_nyg6ow.png', v: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775629823/Man_receiving_water_202604081328_ojpwzo.mp4' },
        { i: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641746/person_3_fs9i4c.png', v: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775632464/Woman_receiving_water_202604081413_dfhz7x.mp4' },
        { i: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641748/person_4_dmpxwj.png', v: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775631683/Man_receives_water__202604081358_vptyar.mp4' },
        { i: 'https://res.cloudinary.com/dl5s23mrx/image/upload/v1775641746/person_5_a0tndp.png', v: 'https://res.cloudinary.com/dl5s23mrx/video/upload/v1775636857/Woman_receiving_water_202604081527_kabv6t.mp4' }
    ];

    const wishList = [
        "ขอให้มีความสุขสดชื่น เบิกบานใจ สุขภาพแข็งแรงตลอดปีใหม่ไทย",
        "ขออำนาจคุณพระศรีรัตนตรัยดลบันดาลให้ประสบแต่ความสุขและความเจริญ",
        "ขอให้ปีใหม่นี้เป็นปีที่เต็มไปด้วยความสำเร็จรุ่งเรืองและโชคลาภ",
        "ขอให้มีพลังกายพลังใจที่เข้มแข็ง พร้อมนำพาองค์กรสู่ความก้าวหน้า",
        "ขอให้สิ่งศักดิ์สิทธิ์คุ้มครองให้แคล้วคลาดปลอดภัยจากอุปสรรคทั้งปวง",
        "ขอให้ทุกวันของปีใหม่ไทยเต็มไปด้วยรอยยิ้มและความราบรื่นในการทำงาน",
        "ขอให้มีความสุขสำราญใจ ร่างกายสมบูรณ์แข็งแรง ปราศจากโรคภัยไข้เจ็บ",
        "ขอให้เป็นที่รักและเคารพของลูกน้องและเพื่อนร่วมงานสืบไป",
        "ขอให้มีโชคมีชัย ร่ำรวยเงินทองและบารมีตลอดปีและตลอดไป",
        "ขอให้สายน้ำสงกรานต์ชะล้างความทุกข์โศก และนำพาความสดใสมาสู่ชีวิต"
    ];

    let idx = 0;

    function changePage(n) {
        if(n === 2) {
            const m = document.getElementById('bgMusic');
            m.play().catch(e => console.log('Music start'));
        }
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + n).classList.add('active');
    }

    function startFlow() {
        idx = 0;
        updateContent();
        changePage(3);
    }

    function updateContent() {
        document.getElementById('bossPic').src = dataList[idx].i;
        document.getElementById('vdoSrc').src = dataList[idx].v;
        document.getElementById('vdoPlayer').load();
        document.getElementById('stillPhase').style.display = 'block';
        document.getElementById('vdoPhase').style.display = 'none';
        document.getElementById('nextAction').style.display = 'none';
        document.getElementById('blessText').style.display = 'none';
    }

    function playVdo() {
        document.getElementById('stillPhase').style.display = 'none';
        document.getElementById('vdoPhase').style.display = 'flex';
        const v = document.getElementById('vdoPlayer');
        v.play();
        v.onended = function() {
            const b = document.getElementById('blessText');
            b.innerText = wishList[Math.floor(Math.random() * wishList.length)];
            b.style.display = 'block';
            document.getElementById('nextAction').style.display = 'flex';
            document.getElementById('btnNext').innerText = (idx === dataList.length - 1) ? "จบพิธี (กลับหน้าแรก)" : "ไปท่านถัดไป >";
        };
    }

    function nextStep() {
        if(idx < dataList.length - 1) {
            idx++;
            updateContent();
        } else {
            location.reload();
        }
    }
</script>
</body>
</html>
